<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Beautiful Love ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
overflow-x:hidden;
background:linear-gradient(135deg,#ff7eb3,#ff758c,#ff9a9e);
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{
text-align:center;
padding:30px;
width:90%;
max-width:700px;
position:relative;
z-index:10;
margin:40px 0;
}

.envelope{
font-size:130px;
cursor:pointer;
transition:.4s;
animation:float 2s ease-in-out infinite;
}

.envelope:hover{
transform:scale(1.1);
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

.hidden{
display:none;
}

.letter{
margin-top:20px;
padding:30px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,.2);
min-height:320px;
}

h1{
font-family:"Dancing Script",cursive;
font-size:52px;
margin-bottom:20px;
}

#message{
font-size:19px;
line-height:1.8;
white-space:pre-wrap;
min-height:220px;
text-align:left;
}

button{
margin-top:25px;
padding:15px 35px;
border:none;
border-radius:50px;
cursor:pointer;
font-size:18px;
font-weight:bold;
transition:.3s;
}

#yes{
background:white;
color:#ff3b7a;
}

#yes:hover{
transform:scale(1.1);
}

#no{
background:#ff3b7a;
color:white;
position:relative;
}

.counter{
margin-top:25px;
font-size:18px;
font-weight:600;
}

.heart{
position:fixed;
top:-50px;
font-size:24px;
animation:fall linear forwards;
pointer-events:none;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(720deg);
opacity:0;
}
}

.photo{
width:220px;
height:220px;
border-radius:50%;
object-fit:cover;
object-position:center 30%;
border:5px solid white;
margin:20px auto;
display:block;
box-shadow:0 10px 25px rgba(0,0,0,.3);
}

.musicBtn{
position:fixed;
top:20px;
right:20px;
background:white;
color:#ff3b7a;
padding:12px 18px;
border-radius:50px;
cursor:pointer;
font-weight:bold;
z-index:20;
}

.songNote{
font-size:14px;
opacity:.85;
margin-top:8px;
}

canvas{
position:fixed;
left:0;
top:0;
pointer-events:none;
}

.bigMessage{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
display:none;
justify-content:center;
align-items:center;
text-align:center;
background:rgba(255,60,120,.85);
z-index:100;
padding:20px;
}

.bigMessage span{
font-family:"Dancing Script",cursive;
font-size:60px;
color:white;
line-height:1.3;
}

@media (max-width:600px){
.bigMessage span{
font-size:40px;
}
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="musicBtn" onclick="toggleMusic()">🎵 Tahanan</div>

<div class="container">

<div class="envelope" id="envelope">
💌
<p style="font-size:22px;margin-top:10px;">Click to Open</p>
</div>

<div class="letter hidden" id="letter">

<img class="photo" src="couple.jpg" alt="Our photo together">

<h1>My Love ❤️</h1>

<div id="message"></div>

<div class="counter" id="counter"></div>

<button id="yes">Yes, Forever ❤️</button>
<button id="no">No 😅</button>

</div>

</div>

<div class="bigMessage" id="bigMessage">
<span id="bigMessageText"></span>
</div>

<!-- 
  Add your own "Tahanan" audio file here.
  Since this is copyrighted music, add your own mp3 link/file, e.g.:
  <source src="tahanan.mp3">
  You can upload the mp3 into this same GitHub repo and point the src to its filename.
-->
<audio id="music" loop>
<source src="tahanan.mp3">
</audio>

<script>

const text=`My Love,

Thank you for these 8 months, love. Every date, every quiet night in, every random conversation — I regret none of it. You already have a permanent place in my heart, no matter what life throws at us. I love you more than words can really capture, and I hope one day we look back on all of this and smile, knowing we chose each other through everything.

Don't be too hard on yourself while chasing your dreams — I know you'll get there. I'm praying for every good thing to come your way, and for every beautiful memory along the path. Just keep going, and wait for me — our future is going to be a bright one, and we'll build our direction together.

I will always cherish you, support you, and appreciate every part of who you are. All I want is a lifetime with you — building memories, facing challenges side by side, and growing together, loving each other more with every day that passes.

I'm wishing you nothing but happiness, success, and every good thing life has to offer.

I love you so much, my future nurse. ❤️

Forever yours,
❤️`;

const envelope=document.getElementById("envelope");
const letter=document.getElementById("letter");
const message=document.getElementById("message");

envelope.onclick=()=>{
envelope.style.display="none";
letter.classList.remove("hidden");
typeWriter();
setInterval(createHeart,180);
fireworks();
};

function typeWriter(){
let i=0;
const timer=setInterval(()=>{
message.innerHTML+=text.charAt(i);
i++;
if(i>=text.length)
clearInterval(timer);
},35);
}

function createHeart(){
const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML=["❤️","🌸","💖","🌹"][Math.floor(Math.random()*4)];
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=3+Math.random()*3+"s";
heart.style.fontSize=20+Math.random()*30+"px";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),6000);
}

// Anniversary date set to 7/9/2026
const relationship=new Date("2026-07-09");

function updateCounter(){
const now=new Date();
const diff=now-relationship;
const days=Math.floor(diff/86400000);
const hours=Math.floor(diff/3600000)%24;
const mins=Math.floor(diff/60000)%60;
document.getElementById("counter").innerHTML=
"❤️ We've been making memories for <br><b>"+days+
" days "+hours+" hours "+mins+" minutes</b>";
}

setInterval(updateCounter,1000);
updateCounter();

const no=document.getElementById("no");
no.addEventListener("mouseover",()=>{
const x=Math.random()*300-150;
const y=Math.random()*200-100;
no.style.transform=`translate(${x}px,${y}px)`;
});

document.getElementById("yes").onclick=()=>{

const bigMessage=document.getElementById("bigMessage");
const bigMessageText=document.getElementById("bigMessageText");
const finalText="okay, sinasagot na kita ❤️";

bigMessage.style.display="flex";
bigMessageText.innerHTML="";

let i=0;
const timer=setInterval(()=>{
bigMessageText.innerHTML+=finalText.charAt(i);
i++;
if(i>=finalText.length){
clearInterval(timer);
}
},80);

fireworks();

};

const music=document.getElementById("music");
function toggleMusic(){
if(music.paused){
music.play().catch(()=>{});
}else{
music.pause();
}
}

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function fireworks(){
for(let i=0;i<200;i++){
particles.push({
x:window.innerWidth/2,
y:window.innerHeight/2,
vx:(Math.random()-0.5)*10,
vy:(Math.random()-0.5)*10,
life:100
});
}
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach((p,index)=>{
ctx.beginPath();
ctx.arc(p.x,p.y,3,0,Math.PI*2);
ctx.fillStyle=`hsl(${Math.random()*360},100%,70%)`;
ctx.fill();
p.x+=p.vx;
p.y+=p.vy;
p.life--;
if(p.life<=0)
particles.splice(index,1);
});
requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize",()=>{
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
});

</script>

</body>
</html>
